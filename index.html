<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*ส่วนของCSS*/
        /*ใช้เเต่ง id class*/
        @font-face {
            font-family: 'Kanit';
            src: url('./Kanit/Kanit-Regular.ttf') ;
        }
        body{
            font-family: 'Kanit';
        }
        .container{
            width: 400px;
            margin-left: auto;
            margin-right: auto;
            padding: 20px;
            background-color: aquamarine;
        }
        .header{
            font-size: 30px;
            text-align: center;
            margin-bottom: 20px;
        }
        .header-form{
            width: 140px;
        }
        .flex{
            display: flex;
        }
        .form-input{
            margin-bottom: 10px;
        }
        input.form, textarea{
            border: 1px solid #ccc;
            width: 100%;
        }
        .button{
            border: black;
            width: 100%;
            height: 40px;
            background-color: tomato;

        }
    </style>   
</head>
<body>
    <div class="container">
        <div class="header">
            Register form
        </div>
        <div class="flex form-input">
            <div class="header-form">ชื่อ</div>
            <input class="form" type="text">
        </div>
        <div class="flex form-input">
            <div class="header-form"> นามสกุล </div>
            <input class="form" type="text"> 
        </div>
        <div class="flex form-input">
            <div class="header-form">อายุ</div>
            <input class="form" type="number" min="0" max="100">
        </div>

   
    <div class="flex gender form-input">
     <div class="header-form">เพศ</div>
     <div>
        <input name="gender" type="radio"> ชาย
        <input name="gender" type="radio"> หญิง
        <input name="gender" type="radio"> ไม่ระบุ
     </div>
    </div> 

    
    <div class="form-input">
        งานอดิเรก
    <div>
        <input type="checkbox" name="hobby" > อ่านหนังสือ
    </div>
    <div>
        <input type="checkbox" name="hobby" > ดูหนัง
    </div>
    <div>
        <input type="checkbox" name="hobby" > ฟังเพลง
    </div>
    </div>
    <div class="form-input">
        คำอธิบาย
        <textarea></textarea>
    </div>
    <div class="center">
        <button class="button">ส่งข้อมูล</button>
    </div>
    </div>
    
</body>
</html>
